<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>FrutaBolas Loading</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="background-container">
    <video id="video1" class="bg-video" autoplay muted playsinline></video>
    <video id="video2" class="bg-video hidden" autoplay muted playsinline></video>
</div>

<div id="background-container">
    <img id="gif-bg" src="assets/gif1.gif">
</div>

<div id="overlay"></div>

<div id="content">

    <img src="assets/logo.png" id="logo">

    <div id="status">Conectando...</div>

    <div id="progress-container">
        <div id="progress-bar"></div>
    </div>

    <div id="tip">
        Cargando consejos...
    </div>

    <div id="social-link">
    discord.gg/frutabolas
</div>

<div id="socials">

    <img
    src="assets/discord.png"
    class="social-icon"
    id="icon-discord">

    <img
    src="assets/youtube.png"
    class="social-icon"
    id="icon-youtube">

    <img
    src="assets/tiktok.png"
    class="social-icon"
    id="icon-tiktok">

</div>

</div>

<script src="script.js"></script>

</body>
</html>
